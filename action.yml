name: 'RiskRaft Dependency Sync'
description: 'Sync your project dependencies to RiskRaft for continuous vulnerability monitoring'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'RiskRaft API key (requires write scope). Store as a GitHub secret.'
    required: true
  api-url:
    description: 'RiskRaft API base URL'
    required: false
    default: 'https://app.riskraft.io'
  project-id:
    description: 'RiskRaft project ID to assign packages to'
    required: false
  project-name:
    description: 'RiskRaft project name (alternative to project-id, resolved server-side)'
    required: false
  mode:
    description: '"add" to append new packages, "replace" to mirror manifest exactly (removes packages no longer in your files)'
    required: false
    default: 'replace'
  manifest-files:
    description: 'Comma-separated list of manifest file paths (auto-detected if not specified)'
    required: false
  sbom-file:
    description: 'Path to a CycloneDX or SPDX SBOM file (recommended). When set, manifest-files is ignored and the SBOM is the sole input — produces accurate exact-version data with no wildcard / range pollution. Pair with anchore/sbom-action to generate one.'
    required: false

outputs:
  packages-added:
    description: 'Number of new packages added'
  packages-updated:
    description: 'Number of packages with version updates'
  packages-removed:
    description: 'Number of packages removed (replace mode only)'
  summary:
    description: 'Human-readable summary of changes'

runs:
  using: 'node24'
  main: 'dist/index.js'
